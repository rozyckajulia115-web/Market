<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supermarket Together — Manager Cen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Outfit:wght@400;600;800&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface2: #1f2330;
    --border: #2a2e3a;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #4ade80;
    --accent-dim: #22543d;
    --warn: #fbbf24;
    --warn-dim: #713f12;
    --danger: #f87171;
    --danger-dim: #7f1d1d;
    --blue: #60a5fa;
    --blue-dim: #1e3a5f;
    --purple: #a78bfa;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  .app { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 1.6rem; letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 10px;
  }

  .thursday-banner {
    background: var(--warn-dim); border: 1px solid var(--warn); color: var(--warn);
    padding: 12px 18px; border-radius: var(--radius); font-weight: 600;
    font-size: 0.9rem; width: 100%; text-align: center;
    animation: pulse 2s ease-in-out infinite; display: none; margin-bottom: 20px;
  }

  .thursday-banner.active { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

  .toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
    padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); border-color: var(--text-dim); }
  .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: #2a6e45; }
  .btn.warn { background: var(--warn-dim); border-color: var(--warn); color: var(--warn); }
  .btn.warn:hover { background: #8a4d15; }
  .btn.danger { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: #991b1b; }
  .btn.small { padding: 4px 10px; font-size: 0.78rem; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--text-dim); padding: 4px 8px; }
  .btn.ghost:hover { color: var(--text); }

  .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 18px; flex: 1; min-width: 110px;
  }
  .stat-card .label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin-top: 2px; }
  .stat-card .value.green { color: var(--accent); }
  .stat-card .value.yellow { color: var(--warn); }
  .stat-card .value.blue { color: var(--blue); }

  .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }

  .filter-tab {
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-tab:hover { color: var(--text); border-color: var(--text-dim); }
  .filter-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 580px; }

  thead th {
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-dim); padding: 12px 14px; text-align: left;
    border-bottom: 1px solid var(--border); background: var(--surface2); cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.needs-update { background: rgba(251, 191, 36, 0.07); }

  tbody td { padding: 10px 14px; font-size: 0.88rem; vertical-align: middle; }

  .category-badge {
    display: inline-block; font-size: 0.72rem; font-weight: 600;
    padding: 2px 10px; border-radius: 12px; background: var(--blue-dim); color: var(--blue); white-space: nowrap;
  }

  .shelves-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 0.85rem; color: var(--purple); font-weight: 600;
  }

  .price-input {
    width: 80px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600;
    padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); text-align: right;
  }
  .price-input:focus { outline: none; border-color: var(--accent); }
  .price-input.highlight { border-color: var(--warn); background: rgba(251,191,36,0.08); }

  .sell-price { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--accent); }

  .update-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--warn); margin-right: 6px; animation: pulse 1.5s ease-in-out infinite;
  }

  .actions-cell { display: flex; gap: 2px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; width: 100%; max-width: 420px;
    max-height: 90vh; overflow-y: auto;
  }

  .modal h2 { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.15rem; margin-bottom: 18px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 0.76rem; font-weight: 600; color: var(--text-dim);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .field input, .field select {
    width: 100%; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text);
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9rem; margin-bottom: 6px; }

  .search-input {
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); width: 180px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  .cat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .cat-row:last-child { border-bottom: none; }

  .formula-note {
    font-size: 0.75rem; color: var(--text-dim); text-align: right;
    padding: 8px 14px; border-top: 1px solid var(--border);
  }

  @media (max-width: 640px) {
    .header h1 { font-size: 1.2rem; }
    .price-input { width: 64px; font-size: 0.85rem; }
    .search-input { width: 140px; }
    .stat-card { min-width: 90px; padding: 10px 12px; }
    .stat-card .value { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>🛒 Supermarket Manager</h1>
    <button class="btn warn" onclick="triggerThursday()">📅 Nowy czwartek!</button>
  </div>

  <div class="thursday-banner" id="thursdayBanner">
    <span>⚠️ CZWARTEK — Ceny rynkowe się zmieniły! Zaktualizuj ceny poniżej.</span>
    <button class="btn small" onclick="dismissThursday()">Gotowe ✓</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label">Produkty</div><div class="value blue" id="statProducts">0</div></div>
    <div class="stat-card"><div class="label">Kategorie</div><div class="value green" id="statCategories">0</div></div>
    <div class="stat-card"><div class="label">Półki łącznie</div><div class="value" style="color:var(--purple)" id="statShelves">0</div></div>
    <div class="stat-card"><div class="label">Do aktualizacji</div><div class="value yellow" id="statUpdates">0</div></div>
  </div>

  <div class="toolbar">
    <button class="btn primary" onclick="openModal('product')">+ Produkt</button>
    <button class="btn" onclick="openModal('category')">+ Kategoria</button>
    <input class="search-input" type="text" placeholder="🔍 Szukaj..." id="searchInput" oninput="render()">
  </div>

  <div class="filter-bar" id="filterBar"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:30px"></th>
          <th>Produkt</th>
          <th>Kategoria</th>
          <th>Półki</th>
          <th>Cena rynkowa</th>
          <th>Cena sprzedaży</th>
          <th style="width:70px"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="formula-note" id="formulaNote" style="display:none;">
      Formuła: cena rynkowa × 2 − 0,01
    </div>
    <div class="empty-state" id="emptyState">
      <div class="big">📦</div>
      <p>Brak produktów</p>
      <p style="font-size:0.8rem;">Kliknij <strong>+ Produkt</strong> aby dodać pierwszy.</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const STORAGE_KEY = 'supermarket_together_data_v2';

let data = loadData();
let activeFilter = null;

function defaultData() {
  return { products: [], categories: ['Bez kategorii'], thursdayActive: false };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    const d = JSON.parse(raw);
    if (!d.categories || !d.categories.length) d.categories = ['Bez kategorii'];
    if (!d.products) d.products = [];
    d.products.forEach(p => { if (p.needsUpdate === undefined) p.needsUpdate = false; });
    return d;
  } catch { return defaultData(); }
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ==================== RENDER ====================
function render() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  document.getElementById('statProducts').textContent = data.products.length;
  document.getElementById('statCategories').textContent = data.categories.length;
  document.getElementById('statShelves').textContent = data.products.reduce((s, p) => s + (p.shelves || 0), 0);
  const updCount = data.products.filter(p => p.needsUpdate).length;
  document.getElementById('statUpdates').textContent = updCount;

  const banner = document.getElementById('thursdayBanner');
  banner.classList.toggle('active', data.thursdayActive && updCount > 0);

  // Filter tabs
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-tab' + (activeFilter === null ? ' active' : '');
  allBtn.textContent = 'Wszystkie (' + data.products.length + ')';
  allBtn.onclick = () => { activeFilter = null; render(); };
  filterBar.appendChild(allBtn);

  data.categories.forEach(cat => {
    const count = data.products.filter(p => p.category === cat).length;
    const btn = document.createElement('button');
    btn.className = 'filter-tab' + (activeFilter === cat ? ' active' : '');
    btn.textContent = cat + ' (' + count + ')';
    btn.onclick = () => { activeFilter = cat; render(); };
    filterBar.appendChild(btn);
  });

  // Filter & sort products
  let filtered = data.products.slice();
  if (activeFilter) filtered = filtered.filter(p => p.category === activeFilter);
  if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));

  filtered.sort((a, b) => {
    if (a.needsUpdate && !b.needsUpdate) return -1;
    if (!a.needsUpdate && b.needsUpdate) return 1;
    return a.name.localeCompare(b.name, 'pl');
  });

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const formulaNote = document.getElementById('formulaNote');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    empty.style.display = 'block';
    formulaNote.style.display = 'none';
  } else {
    empty.style.display = 'none';
    formulaNote.style.display = 'block';

    filtered.forEach(p => {
      const tr = document.createElement('tr');
      if (p.needsUpdate) tr.className = 'needs-update';

      const sellPrice = p.marketPrice > 0 ? (p.marketPrice * 2 - 0.01).toFixed(2) : '—';

      tr.innerHTML =
        '<td>' + (p.needsUpdate ? '<span class="update-dot"></span>' : '') + '</td>' +
        '<td><strong>' + esc(p.name) + '</strong></td>' +
        '<td><span class="category-badge">' + esc(p.category) + '</span></td>' +
        '<td><span class="shelves-badge">🗄️ ' + p.shelves + '</span></td>' +
        '<td><input class="price-input ' + (p.needsUpdate ? 'highlight' : '') + '" type="number" step="0.01" min="0" value="' + (p.marketPrice || '') + '" placeholder="0.00" data-id="' + p.id + '" onfocus="this.select()"></td>' +
        '<td><span class="sell-price">' + sellPrice + '</span></td>' +
        '<td><div class="actions-cell">' +
          '<button class="btn ghost small" data-edit="' + p.id + '" title="Edytuj">✏️</button>' +
          '<button class="btn ghost small" data-delete="' + p.id + '" title="Usuń">🗑️</button>' +
        '</div></td>';

      tbody.appendChild(tr);
    });

    // Event delegation for price inputs
    tbody.querySelectorAll('.price-input').forEach(input => {
      input.addEventListener('change', function() {
        updatePrice(this.dataset.id, this.value);
      });
    });

    tbody.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', function() { openModal('product', this.dataset.edit); });
    });

    tbody.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', function() { deleteProduct(this.dataset.delete); });
    });
  }
}

// ==================== THURSDAY ====================
function triggerThursday() {
  data.thursdayActive = true;
  data.products.forEach(p => p.needsUpdate = true);
  saveData(); render();
}

function dismissThursday() {
  data.thursdayActive = false;
  data.products.forEach(p => p.needsUpdate = false);
  saveData(); render();
}

// ==================== PRICE UPDATE ====================
function updatePrice(id, val) {
  const p = data.products.find(x => x.id === id);
  if (!p) return;
  p.marketPrice = parseFloat(val) || 0;
  p.needsUpdate = false;
  saveData(); render();
}

// ==================== MODALS ====================
function openModal(type, editId) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  overlay.classList.remove('hidden');

  if (type === 'product') {
    const existing = editId ? data.products.find(p => p.id === editId) : null;
    const title = existing ? 'Edytuj produkt' : 'Dodaj produkt';
    const btnLabel = existing ? 'Zapisz' : 'Dodaj';

    content.innerHTML =
      '<h2>' + title + '</h2>' +
      '<div class="field"><label>Nazwa produktu</label>' +
        '<input id="mpName" type="text" value="' + (existing ? esc(existing.name) : '') + '" placeholder="np. Mleko 1L"></div>' +
      '<div class="field"><label>Kategoria</label>' +
        '<select id="mpCategory">' +
          data.categories.map(c => '<option value="' + esc(c) + '"' + (existing && existing.category === c ? ' selected' : '') + '>' + esc(c) + '</option>').join('') +
        '</select></div>' +
      '<div class="field"><label>Liczba półek</label>' +
        '<input id="mpShelves" type="number" min="0" value="' + (existing ? existing.shelves : 1) + '" placeholder="1"></div>' +
      '<div class="field"><label>Cena rynkowa (opcjonalnie)</label>' +
        '<input id="mpPrice" type="number" step="0.01" min="0" value="' + (existing && existing.marketPrice ? existing.marketPrice : '') + '" placeholder="0.00"></div>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="closeModal()">Anuluj</button>' +
        '<button class="btn primary" id="saveProductBtn">' + btnLabel + '</button>' +
      '</div>';

    document.getElementById('saveProductBtn').addEventListener('click', () => saveProduct(editId || ''));

    // Enter to submit
    content.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveProduct(editId || ''); });
    });

    setTimeout(() => document.getElementById('mpName').focus(), 50);

  } else if (type === 'category') {
    content.innerHTML =
      '<h2>Zarządzaj kategoriami</h2>' +
      '<div id="catList"></div>' +
      '<div class="field" style="margin-top:14px;"><label>Nowa kategoria</label>' +
        '<input id="mcName" type="text" placeholder="np. Nabiał"></div>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="closeModal()">Zamknij</button>' +
        '<button class="btn primary" id="addCatBtn">Dodaj</button>' +
      '</div>';

    document.getElementById('addCatBtn').addEventListener('click', addCategory);
    document.getElementById('mcName').addEventListener('keydown', e => { if (e.key === 'Enter') addCategory(); });

    renderCatList();
    setTimeout(() => document.getElementById('mcName').focus(), 50);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function saveProduct(editId) {
  const name = document.getElementById('mpName').value.trim();
  const category = document.getElementById('mpCategory').value;
  const shelves = parseInt(document.getElementById('mpShelves').value) || 1;
  const price = parseFloat(document.getElementById('mpPrice').value) || 0;

  if (!name) { alert('Wpisz nazwę produktu.'); return; }

  if (editId) {
    const p = data.products.find(x => x.id === editId);
    if (p) { p.name = name; p.category = category; p.shelves = shelves; p.marketPrice = price; }
  } else {
    data.products.push({
      id: 'p' + Date.now() + Math.random().toString(36).slice(2, 6),
      name, category, shelves, marketPrice: price, needsUpdate: false
    });
  }
  saveData(); closeModal(); render();
}

function deleteProduct(id) {
  const p = data.products.find(x => x.id === id);
  if (!p) return;
  if (!confirm('Usunąć produkt "' + p.name + '"?')) return;
  data.products = data.products.filter(x => x.id !== id);
  saveData(); render();
}

// ==================== CATEGORIES ====================
function renderCatList() {
  const list = document.getElementById('catList');
  if (!list) return;
  list.innerHTML = '';

  data.categories.forEach((c, i) => {
    const count = data.products.filter(p => p.category === c).length;
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML =
      '<span class="category-badge">' + esc(c) + '</span>' +
      '<span style="font-size:0.78rem;color:var(--text-dim);flex:1;text-align:right;margin-right:8px;">' + count + ' prod.</span>' +
      (data.categories.length > 1 ? '<button class="btn ghost small" data-catdel="' + i + '" title="Usuń">🗑️</button>' : '');
    list.appendChild(row);
  });

  list.querySelectorAll('[data-catdel]').forEach(btn => {
    btn.addEventListener('click', function() { deleteCategory(parseInt(this.dataset.catdel)); });
  });
}

function addCategory() {
  const input = document.getElementById('mcName');
  const name = input.value.trim();
  if (!name) return;
  if (data.categories.includes(name)) { alert('Ta kategoria już istnieje.'); return; }
  data.categories.push(name);
  saveData();
  input.value = '';
  renderCatList();
  render();
}

function deleteCategory(i) {
  const cat = data.categories[i];
  const count = data.products.filter(p => p.category === cat).length;
  if (count > 0) {
    const target = data.categories.find((c, idx) => idx !== i) || 'Bez kategorii';
    if (!confirm('Kategoria "' + cat + '" ma ' + count + ' produktów.\nZostaną przeniesione do "' + target + '". Kontynuować?')) return;
    data.products.forEach(p => { if (p.category === cat) p.category = target; });
  } else {
    if (!confirm('Usunąć kategorię "' + cat + '"?')) return;
  }
  data.categories.splice(i, 1);
  if (data.categories.length === 0) data.categories.push('Bez kategorii');
  if (activeFilter === cat) activeFilter = null;
  saveData(); renderCatList(); render();
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ==================== INIT ====================
render();
</script>
</body>
</html>
